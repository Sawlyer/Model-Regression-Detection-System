name: Prompt regression eval

on:
  pull_request:
    paths:
      - "prompts/**"
      - "data/golden_dataset.json"
      - "src/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q

      - name: Run eval
        id: eval
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set +e
          # Baseline run on the oldest prompt, then eval the newest prompt.
          # Without the OPENROUTER_API_KEY secret the CLI falls back to the mock provider.
          NEWEST_PROMPT=$(ls prompts/*.yaml | sort -V | tail -1)
          BASE_PROMPT=$(ls prompts/*.yaml | sort -V | head -1)
          regression-eval run "$BASE_PROMPT" --summary-json /dev/null
          regression-eval run "$NEWEST_PROMPT" --summary-json summary.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### Prompt regression eval\n\n';
            try {
              const s = JSON.parse(fs.readFileSync('summary.json', 'utf8'));
              const icon = {ok: '✅', warning: '⚠️', critical: '🚨', baseline: '🆕'}[s.status] ?? '❓';
              body += `${icon} **Status: ${s.status.toUpperCase()}**\n\n`;
              body += `| Metric | Value |\n|---|---|\n`;
              body += `| Pass rate | ${(s.pass_rate * 100).toFixed(1)}% |\n`;
              body += `| Delta | ${(s.pass_rate_delta * 100).toFixed(1)}% |\n`;
              body += `| Regressions | ${s.regressions} |\n`;
              body += `| Improvements | ${s.improvements} |\n`;
              body += `| Slow drift | ${s.drift ? 'yes ⚠️' : 'no'} |\n\n`;
              body += `Full HTML report available in the workflow artifacts.`;
            } catch (e) {
              body += '❓ Eval failed before producing a summary. Check the job logs.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail on critical regression
        if: steps.eval.outputs.exit_code == '2'
        run: |
          echo "Critical regression detected — blocking merge."
          exit 1
